[mod-info]
multi-team-support=Gives each player their own force/team with independent research, production statistics, and a platforms GUI.

[mod-setting-name]
mts_max_teams=Max Teams
mts_discord_url=Discord URL
mts_claust_oil_distance_tiles=ClaustOrephobic: spawn oil distance (tiles)

[mod-setting-description]
mts_max_teams=Maximum number of teams. Without Space Age: up to 60 (Factorio's 64-force limit minus 4 reserved). With Space Age: capped at 20 due to per-team planet variant pre-creation.
mts_discord_url=Discord invite link shown to new players on join and in periodic reminders. Leave blank to disable both messages.
mts_claust_oil_distance_tiles=Only used with the ClaustOrephobic mod. How far from spawn (in tiles, diagonally) the guaranteed 300% crude-oil node is placed on each team surface. 64 tiles = about 2 chunks; the default ore-free clearing ends ~90 tiles out. Applies to team surfaces generated after a change.
