[mod-info]
multi-team-support=Gives each player their own force/team with independent research, production statistics, and a platforms GUI.

[mod-setting-name]
mts_max_teams=Max Teams
mts_passive_radars=Passive radars (no map scanning)
mts_discord_url=Discord URL
mts_claust_oil_distance_tiles=ClaustOrephobic: spawn oil distance (tiles)

[mod-setting-description]
mts_max_teams=Maximum number of teams. Without Space Age: up to 60 (Factorio's 64-force limit minus 4 reserved), the default. With Space Age: capped at 20 due to per-team planet variant pre-creation, also the default.
mts_passive_radars=Radars keep the area around them visible but no longer run the rotating scan that charts the wider map. The standard radar also draws less power (50 kW instead of 300 kW); radars from other mods keep their own power cost. On a multi-team server this stops every team's radars from permanently charting huge areas, which bloats the save file and costs UPS. Existing charted map stays charted; this only bounds further growth. Purpose-built scanner buildings from other mods are left alone. Requires a full restart to change.
mts_claust_oil_distance_tiles=Only used with the ClaustOrephobic mod. How far from spawn (in tiles, diagonally) the guaranteed 300% crude-oil node is placed on each team surface. 64 tiles = about 2 chunks; the default ore-free clearing ends ~90 tiles out. Applies to team surfaces generated after a change.

[entity-name]
# Prefix applied to any radar the "Passive radars" setting passivizes. __1__ is
# the radar's original name, so vanilla "Radar" becomes "Passive Radar" and a
# modded radar keeps its own identity (e.g. "Passive Big Radar"). Keys say
# "passivized", not "passive-radar", so they never alias the hidden
# mts-passive-radar entity's own locale lookups.
mts-passivized-radar-prefix=Passive __1__

[entity-description]
mts-passivized-radar=Keeps the area around it visible, but no longer scans outward to chart the wider map.
